<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Mode — DailyDict Vocab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .quiz-streak-row {
      display: flex;
      justify-content: center;
      margin-top: var(--space-4);
      font-size: var(--text-sm);
      font-weight: var(--weight-semi);
      color: var(--c-streak);
      background: var(--c-streak-bg);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }
    
    .quiz-choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
      max-width: 520px;
      margin: 0 auto var(--space-8);
      padding: 0 var(--space-5);
    }

    /* Result styles */
    .wp-result {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: var(--space-12) var(--space-6);
      text-align: center;
      gap: var(--space-4);
    }
    .result-score { font-size: var(--text-2xl); font-weight: var(--weight-bold); color: var(--c-text-1); }
    .result-pct { font-size: var(--text-lg); color: var(--c-primary); font-weight: var(--weight-semi); }
    
    .wrong-row {
      display: flex;
      flex-direction: column;
      padding: var(--space-4);
      background: var(--c-danger-bg);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-3);
      text-align: left;
      border: 1px solid #FECACA;
    }
    .wrong-word { font-weight: var(--weight-bold); color: var(--c-danger); font-size: var(--text-base); }
    .wrong-vi { font-size: var(--text-sm); color: var(--c-text-3); margin-top: 2px; }
  </style>
</head>
<body>
  <div class="progress-container">
    <div id="quiz-bar" class="progress-fill" style="width: 0%"></div>
  </div>

  <header class="app-header">
    <div class="header-inner">
      <a href="index.html" class="header-brand">
        <span class="brand-icon">←</span>
        <span class="brand-name">Dashboard</span>
      </a>
      <h1 style="font-size: var(--text-base); font-weight: var(--weight-semi); color: var(--c-text-1);">Quiz Mode</h1>
      <span id="quiz-progress" style="font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--c-text-3);">0 / 0</span>
    </div>
  </header>

  <div class="container">
    <!-- SETUP SCREEN — hiện mặc định, ẩn khi bắt đầu -->
    <div id="quiz-setup" class="setup-screen">
      <h2 class="setup-screen__title">⚙️ Chọn bộ từ để luyện</h2>

      <!-- Chọn nguồn từ -->
      <div class="setup-group">
        <label class="setup-label">Nguồn từ</label>
        <div class="setup-chips" id="setup-source-chips">
          <button class="setup-chip setup-chip--active" data-source="due">📅 Đến hạn hôm nay</button>
          <button class="setup-chip" data-source="all">📚 Tất cả từ</button>
          <button class="setup-chip" data-source="lesson">🎧 Theo bài học</button>
          <button class="setup-chip" data-source="tag">🏷️ Theo tag</button>
        </div>
      </div>

      <!-- Dropdown bài học — chỉ hiện khi chọn "Theo bài học" -->
      <div class="setup-group" id="setup-lesson-group" style="display:none">
        <label class="setup-label">Chọn bài</label>
        <select class="setup-select" id="setup-lesson-select">
          <option value="">-- Chọn bài học --</option>
        </select>
      </div>

      <!-- Dropdown tag — chỉ hiện khi chọn "Theo tag" -->
      <div class="setup-group" id="setup-tag-group" style="display:none">
        <label class="setup-label">Chọn tag</label>
        <select class="setup-select" id="setup-tag-select">
          <option value="">-- Chọn tag --</option>
        </select>
      </div>

      <!-- Số từ mỗi session -->
      <div class="setup-group">
        <label class="setup-label">Số từ mỗi lượt</label>
        <div class="setup-chips" id="setup-size-chips">
          <button class="setup-chip" data-size="10">10 từ</button>
          <button class="setup-chip setup-chip--active" data-size="20">20 từ</button>
          <button class="setup-chip" data-size="30">30 từ</button>
          <button class="setup-chip" data-size="0">Tất cả</button>
        </div>
      </div>

      <!-- Preview số từ tìm được -->
      <div class="setup-preview" id="setup-preview">
        <span id="setup-preview-count">--</span> từ khớp với bộ lọc
      </div>

      <!-- Nút bắt đầu -->
      <button class="cta-primary" id="btn-start-quiz" style="justify-content:center;" disabled>
        <span class="cta-primary__label">Bắt đầu Quiz →</span>
      </button>
    </div>

    <!-- Phần quiz hiện tại — ẩn mặc định -->
    <div id="quiz-game" style="display:none">
      <!-- Score streak -->
      <div class="quiz-streak-row">
        <span id="quiz-score-display">0 đúng liên tiếp 🔥</span>
      </div>

      <!-- Question Card -->
      <div class="quiz-card" id="quiz-card">
        <div class="quiz-word" id="quiz-word">...</div>
        <div class="quiz-phonetic" id="quiz-phonetic">...</div>
      </div>

      <!-- Choices Grid -->
      <div class="quiz-choices" id="quiz-choices">
        <!-- Buttons will be injected here -->
      </div>

      <!-- Result screen -->
      <div id="quiz-done" class="wp-result">
        <div class="done-emoji" id="qdone-emoji">🎯</div>
        <h2 class="empty-state__title" id="qdone-title">Hoàn thành!</h2>
        <div class="result-score" id="qdone-score">0 / 0 đúng</div>
        <div class="result-pct" id="qdone-pct">0%</div>
        <div id="qdone-wrongs" class="result-wrongs" style="width: 100%; max-width: 480px; margin-top: var(--space-4);"></div>
        
        <div class="cta-section" style="width: 100%; max-width: 320px; margin-top: var(--space-4);">
          <!-- Continue Button (v1.3) -->
          <button class="cta-primary" id="btn-continue-quiz" style="display:none; justify-content:center; margin-bottom: 8px; background: var(--c-success);">
            <span class="cta-primary__label">Luyện tiếp →</span>
            <span class="cta-primary__badge" id="btn-continue-count"></span>
          </button>

          <button class="cta-primary" id="btn-quiz-again" style="justify-content:center;">
            <span class="cta-primary__label">🔄 Chọn bộ từ khác</span>
          </button>
          <div class="cta-secondary-row">
            <a href="review.html" class="cta-secondary" style="text-decoration: none; justify-content: center;">🃏 Thử Flashcard</a>
            <a href="index.html" class="cta-secondary" style="text-decoration: none; justify-content: center;">← Dashboard</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/storage.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
