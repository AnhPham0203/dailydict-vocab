<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ôn tập — DailyDict Vocab</title>
  <script>(function(){var t=localStorage.getItem("dd_theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}());</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo__icon">◆</span>
      <span class="sidebar-logo__name">DailyDict</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item" data-page="home"><i class="sidebar-nav__icon">⌂</i><span>Trang chủ</span></a>
      <a href="words.html" class="nav-item" data-page="words"><i class="sidebar-nav__icon">☰</i><span>Từ vựng</span><span class="nav-badge" id="nav-total-badge" style="display:none"></span></a>
      <a href="review.html" class="nav-item nav-item--primary" data-page="review"><i class="sidebar-nav__icon">⟳</i><span>Ôn tập</span><span class="nav-badge nav-badge--alert" id="nav-due-badge" style="display:none"></span></a>
      <a href="writing.html" class="nav-item" data-page="writing"><i class="sidebar-nav__icon">✎</i><span>Writing</span></a>
      <a href="quiz.html" class="nav-item" data-page="quiz"><i class="sidebar-nav__icon">◎</i><span>Quiz</span></a>
      <a href="exercise.html" class="nav-item" data-page="exercise"><i class="sidebar-nav__icon">⊞</i><span>Bài tập</span></a>
    </nav>
    <div class="sidebar-section-label">BỘ SƯU TẬP</div>
    <nav class="sidebar-nav">
      <a href="tags.html" class="nav-item" data-page="tags"><i class="sidebar-nav__icon">⊡</i><span>Tags</span></a>
      <a href="achievements.html" class="nav-item" data-page="achievements"><i class="sidebar-nav__icon">★</i><span>Thành tích</span><span class="nav-dot" id="nav-badge-dot" style="display:none"></span></a>
      <a href="export.html" class="nav-item" data-page="export"><i class="sidebar-nav__icon">↑</i><span>Export / Import</span></a>
    </nav>
    <button class="theme-toggle-btn" id="theme-toggle"><span id="theme-icon">☽</span><span id="theme-label">Dark mode</span></button>
    <div class="sidebar-streak" id="sidebar-streak">
      <span class="sidebar-streak__fire">🔥</span>
      <div>
        <div class="sidebar-streak__num" id="sidebar-streak-num">0</div>
        <div class="sidebar-streak__label">ngày liên tiếp</div>
      </div>
    </div>
  </aside>

  <div class="app-right">
    <div class="progress-container">
      <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
    </div>
    <div class="mobile-topbar">
      <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
      <span style="font-size:15px;font-weight:700;color:var(--c-text-1);">Ôn tập</span>
      <span></span>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Ôn tập</h1>
        <span class="page-meta" id="progress-text">0 / 0</span>
      </div>

      <!-- Card Container -->
      <div id="card-container" class="card-container">
        <div id="card" class="flashcard">
          <!-- Front -->
          <div id="card-front" style="width: 100%;">
            <div id="word-text" class="flashcard-word">...</div>
            <div id="phonetic-text" class="flashcard-phonetic">...</div>
            <button id="btn-audio-review" style="
              background: var(--c-primary-light); color: var(--c-primary);
              border: none; border-radius: var(--radius-md);
              padding: var(--space-2) var(--space-4); cursor: pointer;
              font-size: var(--text-sm); font-weight: 600;
              margin-top: var(--space-4); font-family: var(--font-main);
            ">🔊 Nghe phát âm</button>
            <div class="flashcard-hint">
              <span>🖱️ Click hoặc ⌨️ Space để xem nghĩa</span>
            </div>
          </div>
          <!-- Back -->
          <div id="card-back" style="display: none; width: 100%;">
            <div id="definition-vi" class="flashcard-vi">...</div>
            <div id="definition-en" class="flashcard-en">...</div>
            <div id="example-text" class="flashcard-example">...</div>
            <div id="source-text" style="font-size: var(--text-xs); color: var(--c-text-4); margin-top: var(--space-4);">...</div>
          </div>
        </div>
      </div>

      <!-- Rating buttons -->
      <div id="rating-row" class="rating-row" style="display: none">
        <button id="rate-again" class="rating-btn rating-again" data-rating="again">
          <span class="rating-btn__label">Quên (1)</span>
          <span class="rating-btn__sublabel">+1 ngày</span>
        </button>
        <button id="rate-hard" class="rating-btn rating-hard" data-rating="hard">
          <span class="rating-btn__label">Khó (2)</span>
          <span class="rating-btn__sublabel">×1.2</span>
        </button>
        <button id="rate-good" class="rating-btn rating-good" data-rating="good">
          <span class="rating-btn__label">Nhớ (3)</span>
          <span class="rating-btn__sublabel">×2.5</span>
        </button>
        <button id="rate-easy" class="rating-btn rating-easy" data-rating="easy">
          <span class="rating-btn__label">Dễ (4)</span>
          <span class="rating-btn__sublabel">×3.2</span>
        </button>
      </div>

      <!-- Done screen -->
      <div id="done-screen" class="done-screen">
        <div class="done-emoji">🎉</div>
        <h2 class="empty-state__title">Tuyệt vời!</h2>
        <p id="done-text" class="empty-state__desc" style="margin-bottom: var(--space-6);"></p>
        <a href="index.html" class="cta-primary" style="text-decoration: none; justify-content: center; max-width: 240px; margin: 0 auto;">
          Về Dashboard
        </a>
      </div>
    </main>
  </div>
</div>

<script src="../shared/storage.js"></script>
<script src="sidebar.js"></script>
<script src="app.js"></script>
<script src="review-app.js"></script>
</body>
</html>
