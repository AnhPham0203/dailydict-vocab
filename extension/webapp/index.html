<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — DailyDict Vocab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <a href="index.html" class="header-brand">
        <span class="brand-icon">◆</span>
        <span class="brand-name">DailyDict Vocab</span>
      </a>
      <nav class="header-nav">
        <a href="words.html" class="nav-link">Từ vựng</a>
        <a href="tags.html" class="nav-link">Tags</a>
        <a href="achievements.html" class="nav-link">Thành tích</a>
        <a href="export.html" class="nav-link">Dữ liệu</a>
        <a href="review.html" class="nav-link nav-link--cta">Ôn tập</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <!-- Stats Layout -->
    <div class="stats-layout">
      <!-- Stat chính: Streak -->
      <div class="stat-hero">
        <div class="stat-hero__icon">🔥</div>
        <div id="stat-streak" class="stat-hero__number">0</div>
        <div class="stat-hero__label">ngày liên tiếp</div>
      </div>

      <!-- 3 stat phụ -->
      <div class="stats-grid-3">
        <div class="stat-item">
          <div id="stat-total" class="stat-item__number">0</div>
          <div class="stat-item__label">Tổng số từ</div>
        </div>
        <div class="stat-item">
          <div class="stat-item__number"><span id="stat-retention">0</span><span class="stat-item__unit">%</span></div>
          <div class="stat-item__label">Tỷ lệ nhớ</div>
        </div>
        <div class="stat-item">
          <div id="stat-due" class="stat-item__number">0</div>
          <div class="stat-item__label">Cần ôn tập</div>
        </div>
      </div>
    </div>

    <!-- Daily Goal Section (v1.2) -->
    <div class="goal-ring-wrap" id="goal-ring-wrap">
      <svg class="goal-ring" viewBox="0 0 80 80" width="80" height="80">
        <circle class="ring-track" cx="40" cy="40" r="32" stroke-width="6"/>
        <circle class="ring-progress" cx="40" cy="40" r="32" stroke-width="6"
                stroke-linecap="round" transform="rotate(-90 40 40)"
                id="ring-progress" stroke-dasharray="201.06" stroke-dashoffset="201.06"/>
        <text x="40" y="36" text-anchor="middle" class="ring-num" id="ring-num">0</text>
        <text x="40" y="50" text-anchor="middle" class="ring-label" id="ring-label">/ 10</text>
      </svg>
      <div class="goal-ring-meta">
        <span class="goal-ring-title">Mục tiêu hôm nay</span>
        <button class="goal-edit-btn" id="btn-edit-goal">Chỉnh sửa mục tiêu</button>
      </div>
    </div>

    <!-- Goal Setter Modal (v1.2) -->
    <div id="goal-setter" class="goal-setter" style="display:none">
      <div class="goal-setter__inner">
        <p class="goal-setter__label">Số từ mục tiêu mỗi ngày</p>
        <div class="goal-options">
          <button class="goal-opt" data-val="5">5</button>
          <button class="goal-opt" data-val="10">10</button>
          <button class="goal-opt" data-val="15">15</button>
          <button class="goal-opt" data-val="20">20</button>
          <button class="goal-opt" data-val="30">30</button>
        </div>
        <div class="goal-custom-row">
          <input type="number" id="goal-custom-input" min="1" max="100" placeholder="Tự nhập..." class="goal-custom-input">
          <button class="goal-save-btn" id="btn-save-goal">Lưu</button>
        </div>
      </div>
    </div>

    <!-- Heatmap Section (v1.2) -->
    <section class="heatmap-section">
      <div class="section-header">
        <h2 class="section-heading" style="margin-bottom: 0;">Lịch học tập</h2>
        <span class="heatmap-total" id="heatmap-total">0 từ trong năm qua</span>
      </div>
      <div class="heatmap-wrap" id="heatmap-wrap">
        <!-- SVG render bằng JS -->
      </div>
      <div class="heatmap-legend">
        <span class="legend-label">Ít</span>
        <div class="legend-cells">
          <div class="legend-cell" style="background:var(--hm-0)"></div>
          <div class="legend-cell" style="background:var(--hm-1)"></div>
          <div class="legend-cell" style="background:var(--hm-2)"></div>
          <div class="legend-cell" style="background:var(--hm-3)"></div>
          <div class="legend-cell" style="background:var(--hm-4)"></div>
        </div>
        <span class="legend-label">Nhiều</span>
      </div>
    </section>

    <!-- Due Words Preview -->
    <h2 class="section-heading">Từ cần ôn tập hôm nay</h2>
    <div id="due-list" class="word-list">
      <!-- Words will be injected here -->
    </div>

    <!-- CTA Section -->
    <div class="cta-section">
      <button class="cta-primary" id="btn-start-review">
        <span class="cta-primary__label">Bắt đầu ôn tập</span>
        <span class="cta-primary__badge" id="due-count-badge">Flashcard</span>
      </button>

      <div class="cta-secondary-row">
        <a href="writing.html" class="cta-secondary" id="btn-start-writing">
          <span class="cta-icon">✍️</span>
          <span>Writing</span>
        </a>
        <a href="quiz.html" class="cta-secondary" id="btn-start-quiz">
          <span class="cta-icon">🎯</span>
          <span>Quiz</span>
        </a>
        <a href="words.html" class="cta-secondary">
          <span class="cta-icon">📚</span>
          <span>Tất cả từ</span>
        </a>
      </div>
    </div>
  </div>

  <script src="../shared/badges.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
