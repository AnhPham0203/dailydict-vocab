<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — DailyDict Vocab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <a href="index.html" class="header-brand">
        <span class="brand-icon">◆</span>
        <span class="brand-name">DailyDict Vocab</span>
      </a>
      <nav class="header-nav">
        <a href="words.html" class="nav-link">Từ vựng</a>
        <a href="review.html" class="nav-link nav-link--cta">Ôn tập</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <!-- Stats Layout -->
    <div class="stats-layout">
      <!-- Stat chính: Streak -->
      <div class="stat-hero">
        <div class="stat-hero__icon">🔥</div>
        <div id="stat-streak" class="stat-hero__number">0</div>
        <div class="stat-hero__label">ngày liên tiếp</div>
      </div>

      <!-- 3 stat phụ -->
      <div class="stats-grid-3">
        <div class="stat-item">
          <div id="stat-total" class="stat-item__number">0</div>
          <div class="stat-item__label">Tổng số từ</div>
        </div>
        <div class="stat-item">
          <div class="stat-item__number"><span id="stat-retention">0</span><span class="stat-item__unit">%</span></div>
          <div class="stat-item__label">Tỷ lệ nhớ</div>
        </div>
        <div class="stat-item">
          <div id="stat-due" class="stat-item__number">0</div>
          <div class="stat-item__label">Cần ôn tập</div>
        </div>
      </div>
    </div>

    <!-- Chart Section -->
    <h2 class="section-heading">Hoạt động 7 ngày qua</h2>
    <div class="chart-wrap">
      <div id="chart-bars" class="chart-bars">
        <!-- Bars will be injected here -->
      </div>
    </div>

    <!-- Due Words Preview -->
    <h2 class="section-heading">Từ cần ôn tập hôm nay</h2>
    <div id="due-list" class="word-list">
      <!-- Words will be injected here -->
    </div>

    <!-- CTA Section -->
    <div class="cta-section">
      <button class="cta-primary" id="btn-start-review">
        <span class="cta-primary__label">Bắt đầu ôn tập</span>
        <span class="cta-primary__badge" id="due-count-badge">Flashcard</span>
      </button>

      <div class="cta-secondary-row">
        <a href="writing.html" class="cta-secondary" id="btn-start-writing">
          <span class="cta-icon">✍️</span>
          <span>Writing</span>
        </a>
        <a href="quiz.html" class="cta-secondary" id="btn-start-quiz">
          <span class="cta-icon">🎯</span>
          <span>Quiz</span>
        </a>
        <a href="words.html" class="cta-secondary">
          <span class="cta-icon">📚</span>
          <span>Tất cả từ</span>
        </a>
      </div>
    </div>
  </div>

  <script src="../shared/storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
