<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — DailyDict Vocab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-header">
    <div style="display: flex; align-items: center; gap: 12px;">
      <span style="font-size: 24px;">📚</span>
      <h1>DailyDict Vocab</h1>
    </div>
    <a href="words.html" class="back-btn">Tất cả từ vựng →</a>
  </div>

  <div class="container">
    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-item">
        <div id="stat-streak" class="stat-num">0🔥</div>
        <div class="stat-label">Ngày học</div>
      </div>
      <div class="stat-item">
        <div id="stat-total" class="stat-num">0</div>
        <div class="stat-label">Tổng số từ</div>
      </div>
      <div class="stat-item">
        <div id="stat-retention" class="stat-num">0%</div>
        <div class="stat-label">Tỷ lệ nhớ</div>
      </div>
      <div class="stat-item">
        <div id="stat-due" class="stat-num">0</div>
        <div class="stat-label">Cần ôn tập</div>
      </div>
    </div>

    <!-- Chart Section -->
    <div class="card-box">
      <h3 style="font-size: 16px; margin-bottom: 8px;">Từ vựng mới (7 ngày qua)</h3>
      <div id="chart-wrap" class="chart-wrap">
        <!-- Bars will be injected here -->
      </div>
    </div>

    <!-- Due Words Preview -->
    <div class="card-box">
      <h3 style="font-size: 16px; margin-bottom: 16px;">Từ cần ôn tập hôm nay</h3>
      <div id="due-list">
        <!-- Words will be injected here -->
      </div>
      <div class="cta-grid">
        <button id="btn-start-review" class="btn-primary">🃏 Flashcard</button>
        <a href="writing.html" class="btn-secondary" id="btn-start-writing">✍️ Writing</a>
        <a href="quiz.html" class="btn-secondary" id="btn-start-quiz">🎯 Quiz</a>
      </div>
    </div>
  </div>

  <script src="../shared/storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
