<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài tập — DailyDict</title>
  <script>(function(){var t=localStorage.getItem("dd_theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}());</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo__icon">◆</span>
      <span class="sidebar-logo__name">DailyDict</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item" data-page="home"><i class="sidebar-nav__icon">⌂</i><span>Trang chủ</span></a>
      <a href="words.html" class="nav-item" data-page="words"><i class="sidebar-nav__icon">☰</i><span>Từ vựng</span><span class="nav-badge" id="nav-total-badge" style="display:none"></span></a>
      <a href="review.html" class="nav-item nav-item--primary" data-page="review"><i class="sidebar-nav__icon">⟳</i><span>Ôn tập</span><span class="nav-badge nav-badge--alert" id="nav-due-badge" style="display:none"></span></a>
      <a href="writing.html" class="nav-item" data-page="writing"><i class="sidebar-nav__icon">✎</i><span>Writing</span></a>
      <a href="quiz.html" class="nav-item" data-page="quiz"><i class="sidebar-nav__icon">◎</i><span>Quiz</span></a>
      <a href="exercise.html" class="nav-item" data-page="exercise"><i class="sidebar-nav__icon">⊞</i><span>Bài tập</span></a>
    </nav>
    <div class="sidebar-section-label">BỘ SƯU TẬP</div>
    <nav class="sidebar-nav">
      <a href="tags.html" class="nav-item" data-page="tags"><i class="sidebar-nav__icon">⊡</i><span>Tags</span></a>
      <a href="achievements.html" class="nav-item" data-page="achievements"><i class="sidebar-nav__icon">★</i><span>Thành tích</span><span class="nav-dot" id="nav-badge-dot" style="display:none"></span></a>
      <a href="export.html" class="nav-item" data-page="export"><i class="sidebar-nav__icon">↑</i><span>Export / Import</span></a>
    </nav>
    <button class="theme-toggle-btn" id="theme-toggle"><span id="theme-icon">☽</span><span id="theme-label">Dark mode</span></button>
    <div class="sidebar-streak" id="sidebar-streak">
      <span class="sidebar-streak__fire">🔥</span>
      <div>
        <div class="sidebar-streak__num" id="sidebar-streak-num">0</div>
        <div class="sidebar-streak__label">ngày liên tiếp</div>
      </div>
    </div>
  </aside>

  <div class="app-right">
    <div class="mobile-topbar">
      <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
      <span style="font-size:15px;font-weight:700;color:var(--c-text-1);" id="mobile-header-title">Bài tập</span>
      <span></span>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">

      <!-- MÀN HÌNH 1: DANH SÁCH BÀI -->
      <div id="screen-list">
        <div class="page-header">
          <h1 class="page-title">Bài tập đã lưu</h1>
          <span class="page-meta" id="exercise-count"></span>
        </div>
        <div id="exercise-list" class="exercise-list"></div>
      </div>

      <!-- MÀN HÌNH 2: WORD SCRAMBLE -->
      <div id="screen-game" style="display:none">
        <div class="page-header">
          <a href="index.html" id="back-btn" class="page-back">← Dashboard</a>
          <h1 class="page-title" id="header-title">Bài tập</h1>
          <span class="page-meta" id="header-meta"></span>
        </div>

        <div class="progress-container" style="margin: 0 0 var(--space-5);">
          <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="scramble-card">
          <div class="scramble-question">
            <div class="scramble-label">Câu tiếng Anh của câu sau là gì?</div>
            <div class="scramble-vi" id="scramble-vi"></div>
          </div>

          <div class="answer-area" id="answer-area">
            <span class="answer-placeholder" id="answer-placeholder">
              Chọn các từ bên dưới để ghép thành câu tiếng Anh...
            </span>
          </div>

          <div class="scramble-divider"></div>

          <div class="word-bank" id="word-bank"></div>
        </div>

        <div class="scramble-actions">
          <button class="btn-ghost-sm" id="btn-clear">↩ Xóa hết</button>
          <button class="btn-primary" id="btn-check">Kiểm tra</button>
        </div>

        <div class="scramble-feedback" id="scramble-feedback" style="display:none"></div>
      </div>

      <!-- MÀN HÌNH 3: KẾT QUẢ -->
      <div id="screen-result" style="display:none">
        <div class="result-screen">
          <div class="result-emoji" id="result-emoji">🎉</div>
          <h2 class="result-title" id="result-title">Hoàn thành!</h2>
          <div class="result-score" id="result-score"></div>
          <div class="result-pct" id="result-pct"></div>
          <div class="result-actions">
            <button class="btn-primary" id="btn-retry">🔄 Làm lại</button>
            <button class="btn-outline" id="btn-back-list">← Chọn bài khác</button>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="../shared/storage.js"></script>
<script src="sidebar.js"></script>
<script src="exercise.js"></script>
</body>
</html>
