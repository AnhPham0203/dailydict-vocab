<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách từ vựng — DailyDict Vocab</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .search-box { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 14px; margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
    .search-box:focus { border-color: var(--primary); }
    .controls { display: flex; gap: 12px; margin-bottom: 20px; }
    .sort-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: #fff; }
    .word-detail { display: none; padding: 12px 16px; background: #f9fafb; border-bottom: 1px solid var(--border); }
    .word-row { cursor: pointer; transition: background 0.1s; }
    .word-row:hover { background: #f5f3ff; }
    .btn-delete { color: #ef4444; background: none; border: none; cursor: pointer; padding: 8px; font-size: 16px; opacity: 0.6; transition: opacity 0.2s; }
    .btn-delete:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="app-header">
    <a href="index.html" class="back-btn">← Dashboard</a>
    <h1 id="total-count">0 từ vựng</h1>
    <div></div>
  </div>

  <div class="container">
    <input type="text" id="search-input" class="search-box" placeholder="Tìm kiếm từ vựng hoặc nghĩa...">
    
    <div class="controls">
      <select id="sort-select" class="sort-select">
        <option value="newest">Mới nhất</option>
        <option value="oldest">Cũ nhất</option>
        <option value="az">A - Z</option>
        <option value="due">Cần ôn tập trước</option>
      </select>
    </div>

    <div class="card-box" style="padding: 0; overflow: hidden;">
      <div id="word-list-container">
        <!-- Word rows will be injected here -->
      </div>
    </div>

    <div id="empty-state" class="empty-state" style="display: none;">
      <div class="empty-emoji">📔</div>
      <p>Chưa có từ vựng nào. Hãy lưu từ mới trên DailyDictation!</p>
    </div>
  </div>

  <script src="../shared/storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
