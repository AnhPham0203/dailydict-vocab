<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách từ vựng — DailyDict Vocab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-4); }
    .sort-select { 
      padding: var(--space-2) var(--space-3); 
      border: 1px solid var(--c-border); 
      border-radius: var(--radius-md); 
      font-size: var(--text-sm); 
      background: var(--c-surface);
      color: var(--c-text-2);
      outline: none;
      font-family: var(--font-main);
    }
    .sort-select:focus { border-color: var(--c-primary); }
    
    .word-detail { 
      display: none; 
      padding: var(--space-4) var(--space-5); 
      background: var(--c-surface-2); 
      border-top: 1px solid var(--c-border);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      margin-top: -1px;
      margin-bottom: var(--space-3);
    }
    
    .word-row-group { margin-bottom: var(--space-3); }
    .word-row-group .word-row { border-radius: var(--radius-lg); }
    .word-row-group.expanded .word-row { border-radius: var(--radius-lg) var(--radius-lg) 0 0; }

    /* v1.3: Filter Bar & Bulk styles */
    .filter-bar {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-xl);
      padding: var(--space-4) var(--space-5);
      margin-bottom: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .filter-group { display: flex; align-items: flex-start; gap: var(--space-3); flex-wrap: wrap; }
    .filter-group__label {
      font-size: var(--text-xs);
      font-weight: var(--weight-semi);
      color: var(--c-text-4);
      text-transform: uppercase;
      letter-spacing: .06em;
      min-width: 60px;
      padding-top: 5px;
      flex-shrink: 0;
    }
    .filter-chips { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .filter-chip {
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      border: 1.5px solid var(--c-border);
      background: var(--c-surface-2);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--c-text-3);
      cursor: pointer;
      font-family: var(--font-main);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: var(--c-primary); color: var(--c-primary); }
    .filter-chip--active { background: var(--c-primary); border-color: var(--c-primary); color: white; }
    
    .filter-select {
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-md);
      border: 1.5px solid var(--c-border);
      background: var(--c-surface-2);
      font-size: var(--text-sm);
      font-family: var(--font-main);
      color: var(--c-text-2);
      cursor: pointer;
      outline: none;
    }

    .filter-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: var(--space-3);
      border-top: 1px solid var(--c-border);
    }
    .filter-clear-btn {
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      color: var(--c-danger);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-main);
    }

    .bulk-toolbar {
      position: sticky;
      top: 70px;
      background: var(--c-text-1);
      color: white;
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 50;
      margin-bottom: var(--space-4);
      box-shadow: var(--shadow-md);
      animation: fadeSlideUp 0.2s ease;
    }
    .bulk-actions { display: flex; gap: var(--space-2); }
    .bulk-btn {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      cursor: pointer;
      font-family: var(--font-main);
      transition: background 0.15s;
    }
    .bulk-btn:hover { background: rgba(255,255,255,0.2); }
    .bulk-btn--danger:hover { background: var(--c-danger); border-color: var(--c-danger); }

    .word-row.selectable::before {
      content: '○';
      font-size: 16px;
      color: var(--c-text-4);
      margin-right: var(--space-2);
    }
    .word-row.selected::before { content: '●'; color: var(--c-primary); }
    .word-row.selected { border-color: var(--c-primary); background: var(--c-primary-light); }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <a href="index.html" class="header-brand">
        <span class="brand-icon">←</span>
        <span class="brand-name">Dashboard</span>
      </a>
      <h1 id="total-count" style="font-size: var(--text-base); font-weight: var(--weight-semi); color: var(--c-text-1);">0 từ vựng</h1>
      <div style="display: flex; gap: 8px;">
        <button class="btn-sm-primary" id="btn-toggle-select" style="background: var(--c-surface); color: var(--c-text-2); border: 1px solid var(--c-border);">☑ Chọn nhiều</button>
      </div>
    </div>
  </header>

  <div class="container">
    <!-- Bulk Toolbar -->
    <div class="bulk-toolbar" id="bulk-toolbar" style="display:none">
      <span id="bulk-count" style="font-size: var(--text-sm); font-weight: var(--weight-semi);">0 đã chọn</span>
      <div class="bulk-actions">
        <button class="bulk-btn" id="btn-bulk-tag">🏷️ Tag</button>
        <button class="bulk-btn bulk-btn--danger" id="btn-bulk-delete">🗑 Xoá</button>
        <button class="bulk-btn" id="btn-deselect-all">✕ Huỷ</button>
      </div>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10.5 10.5L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search-input" class="search-input" placeholder="Tìm kiếm từ vựng hoặc nghĩa...">
    </div>

    <!-- BUG-03: Data Actions (Export/Import) -->
    <div class="data-actions" style="display:flex; gap:8px; margin-bottom: 16px;">
      <button id="btn-export-json" class="cta-secondary" style="flex:1; justify-content:center;">
        ⬇️ Xuất dữ liệu (JSON)
      </button>
      <label class="cta-secondary" style="flex:1; justify-content:center; cursor:pointer;">
        ⬆️ Nhập dữ liệu (JSON)
        <input type="file" id="import-file-json" accept=".json" style="display:none;">
      </label>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar" id="filter-bar">
      <div class="filter-group">
        <span class="filter-group__label">Tag</span>
        <div class="filter-chips" id="filter-tags">
          <button class="filter-chip filter-chip--active" data-tag="all">Tất cả</button>
          <!-- Tags will be injected here -->
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-group__label">Trạng thái</span>
        <div class="filter-chips" id="filter-rating">
          <button class="filter-chip filter-chip--active" data-rating="all">Tất cả</button>
          <button class="filter-chip" data-rating="new">🌱 Mới</button>
          <button class="filter-chip" data-rating="again">😅 Quên</button>
          <button class="filter-chip" data-rating="hard">😓 Khó</button>
          <button class="filter-chip" data-rating="good">😊 Nhớ</button>
          <button class="filter-chip" data-rating="easy">🎯 Dễ</button>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-group__label">Bài học</span>
        <select class="filter-select" id="filter-source">
          <option value="all">Tất cả bài</option>
        </select>
      </div>
      <div class="filter-summary" id="filter-summary" style="display:none">
        <span id="filter-result-count" style="font-size: var(--text-sm); font-weight: var(--weight-semi); color: var(--c-text-2);">0 từ</span>
        <button class="filter-clear-btn" id="btn-clear-filters">✕ Xoá bộ lọc</button>
      </div>
    </div>
    
    <div class="controls">
      <h2 class="section-heading" style="margin-bottom: 0;">Danh sách từ</h2>
      <select id="sort-select" class="sort-select">
        <option value="newest">Mới nhất</option>
        <option value="oldest">Cũ nhất</option>
        <option value="az">A - Z</option>
        <option value="due">Cần ôn tập trước</option>
      </select>
    </div>

    <div id="word-list-container" class="word-list">
      <!-- Word rows will be injected here -->
    </div>

    <div id="empty-state" class="empty-state" style="display: none;">
      <div class="empty-state__circle">
        <span class="empty-state__icon">📔</span>
      </div>
      <h3 class="empty-state__title">Không tìm thấy từ nào</h3>
      <p class="empty-state__desc">Thử thay đổi bộ lọc hoặc tìm kiếm từ khác.</p>
      <button class="empty-state__cta" id="btn-reset-empty" style="background:none; cursor:pointer;">Xoá bộ lọc</button>
    </div>
  </div>

  <script src="../shared/tags.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="app.js"></script>
  <script src="words-app.js"></script>
</body>
</html>
