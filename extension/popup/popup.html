<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-primary: #4F46E5;
      --c-bg: #FAFAF9;
      --c-surface: #FFFFFF;
      --c-text-1: #1C1917;
      --c-text-2: #44403C;
      --c-text-3: #78716C;
      --c-border: #E7E5E4;
      --radius-md: 10px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    }

    body { 
      width: 320px; 
      margin: 0; 
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; 
      background: var(--c-bg); 
      color: var(--c-text-2);
      -webkit-font-smoothing: antialiased;
    }

    #header { 
      background: var(--c-surface); 
      padding: 14px 16px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      border-bottom: 1px solid var(--c-border);
    }

    .brand { display: flex; align-items: center; gap: 8px; }
    .brand-icon { color: var(--c-primary); font-size: 14px; }
    .brand-name { font-weight: 700; font-size: 15px; color: var(--c-text-1); letter-spacing: -0.02em; }

    #today-badge { 
      background: #EEF2FF; 
      color: var(--c-primary); 
      font-size: 11px; 
      padding: 2px 10px; 
      border-radius: 99px; 
      font-weight: 600; 
    }

    .content { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    #stats-row { display: flex; gap: 8px; }
    .stat-box { 
      flex: 1; 
      background: var(--c-surface); 
      border: 1px solid var(--c-border); 
      border-radius: var(--radius-md); 
      padding: 10px; 
      text-align: center;
      transition: border-color 0.15s;
    }
    .stat-box:hover { border-color: var(--c-primary); }
    .stat-num { font-size: 18px; font-weight: 700; color: var(--c-primary); letter-spacing: -0.02em; }
    .stat-label { font-size: 10px; color: var(--c-text-3); margin-top: 2px; font-weight: 500; text-transform: uppercase; }

    #last-word { 
      background: var(--c-surface); 
      border: 1px solid var(--c-border); 
      border-radius: var(--radius-lg); 
      padding: 12px 14px;
      box-shadow: var(--shadow-sm);
    }
    .last-word-label { font-size: 10px; color: var(--c-text-3); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .last-word-word { font-size: 16px; font-weight: 700; color: var(--c-text-1); letter-spacing: -0.01em; }
    .last-word-vi { font-size: 13px; color: var(--c-primary); margin-top: 2px; font-weight: 500; }

    #empty-state { 
      text-align: center; 
      color: var(--c-text-3); 
      font-size: 13px; 
      padding: 24px 0;
      line-height: 1.5;
    }

    .btn { 
      width: 100%; 
      border-radius: var(--radius-md); 
      padding: 12px; 
      font-size: 13px; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.2s; 
      border: none; 
      font-family: inherit;
    }

    #btn-review { 
      background: var(--c-primary); 
      color: #fff; 
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
    }
    #btn-review:hover { background: #4338ca; transform: translateY(-1px); }
    #btn-review:active { transform: translateY(0); }

    #btn-dashboard { 
      background: var(--c-surface); 
      color: var(--c-text-2); 
      border: 1px solid var(--c-border); 
    }
    #btn-dashboard:hover { border-color: var(--c-primary); color: var(--c-primary); background: #F5F3FF; }
  </style>
</head>
<body>
  <div id="header">
    <div class="brand" style="display: flex; align-items: center; gap: 8px;">
      <span style="color: var(--c-primary); font-size: 16px; line-height: 1;">◆</span>
      <span style="font-size: 14px; font-weight: 700; color: var(--c-text-1); letter-spacing: -0.01em;">DailyDict</span>
    </div>
    <span id="today-badge" style="
      background: var(--c-primary-light);
      color: var(--c-primary);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
    ">0 hôm nay</span>
  </div>

  <div class="content">
    <div id="stats-row">
      <div class="stat-box"><div id="total" class="stat-num">0</div><div class="stat-label">Tổng từ</div></div>
      <div class="stat-box"><div id="today" class="stat-num">0</div><div class="stat-label">Hôm nay</div></div>
      <div class="stat-box"><div id="streak" class="stat-num">0</div><div class="stat-label">Streak</div></div>
    </div>

    <div id="last-word" style="display:none;">
      <div class="last-word-label">Từ vừa lưu</div>
      <div class="last-word-word" id="lw-word">...</div>
      <div class="last-word-vi" id="lw-vi">...</div>
    </div>

    <div id="empty-state">
      Bôi đen bất kỳ từ nào<br>trên DailyDictation để bắt đầu ✨
    </div>

    <button id="btn-review" class="btn">Ôn tập ngay →</button>
    <button id="btn-dashboard" class="btn">Mở Dashboard</button>
  </div>

  <script src="../shared/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
